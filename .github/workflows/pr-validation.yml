name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: |
          python -m unittest discover -s packages/errors/tests -p "test_*.py" -v
          python -m unittest discover -s packages/config/tests -p "test_*.py" -v

      - name: Syntax check
        run: |
          python -m py_compile packages/errors/__init__.py
          python -m py_compile packages/errors/catalog.py
          python -m py_compile packages/errors/handlers.py
          python -m py_compile packages/config/__init__.py
